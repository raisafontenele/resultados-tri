<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Tri — Competitive Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="data/quarters.js"></script>
<script src="data/quarters_sicredi.js"></script>
<script src="data/quarters_pagbank.js"></script>
<script src="data/timeline.js"></script>
<script src="data/timeline_sicredi.js"></script>
<script src="data/timeline_pagbank.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232636;
    --border: #2e3148;
    --text: #e8eaf0;
    --text-muted: #8891a8;
    --accent-bradesco: #cc0000;
    --accent-sicredi: #007b3e;
    --accent-pagbank: #f7931a;
    --accent: #cc0000;
    --up: #22c55e;
    --down: #ef4444;
    --neutral: #8891a8;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── TOP NAV ── */
  .top-nav { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); }
  .bank-chips { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px; scrollbar-width: none; }
  .bank-chips::-webkit-scrollbar { display: none; }
  .chip-bank { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 2px solid transparent; background: var(--surface2); color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .chip-bank.active-bradesco { border-color: var(--accent-bradesco); color: var(--accent-bradesco); background: rgba(204,0,0,.12); }
  .chip-bank.active-sicredi  { border-color: var(--accent-sicredi);  color: var(--accent-sicredi);  background: rgba(0,123,62,.12); }
  .chip-bank.active-pagbank  { border-color: var(--accent-pagbank);  color: var(--accent-pagbank);  background: rgba(247,147,26,.12); }

  /* ── TABS ── */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; text-align: center; padding: 10px 4px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab.active { color: var(--text); border-bottom-color: currentColor; }
  .tab-content { display: none; padding: 16px; }
  .tab-content.visible { display: block; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-muted); margin-bottom: 10px; }

  /* ── PERIOD BADGE ── */
  .period-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); margin-bottom: 12px; }

  /* ── KPI GRID ── */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .kpi-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 10px; }
  .kpi-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .kpi-deltas { display: flex; gap: 6px; flex-wrap: wrap; }
  .delta { font-size: 11px; font-weight: 600; padding: 2px 5px; border-radius: 4px; }
  .delta.up   { color: var(--up);   background: rgba(34,197,94,.1); }
  .delta.down { color: var(--down); background: rgba(239,68,68,.1); }
  .delta.neutral { color: var(--neutral); background: rgba(136,145,168,.1); }

  /* ── HIGHLIGHTS ── */
  .highlight-list { list-style: none; }
  .highlight-list li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5; display: flex; gap: 8px; }
  .highlight-list li:last-child { border-bottom: none; }
  .highlight-list li::before { content: '›'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

  /* ── PERCEPTION / GUIDANCE ── */
  .text-block { font-size: 13px; line-height: 1.6; color: var(--text); }
  .guidance-pill { display: inline-block; background: rgba(255,255,255,.06); border-radius: 4px; padding: 4px 8px; font-size: 12px; margin: 3px 3px 3px 0; }

  /* ── EVOLUÇÃO ── */
  .kpi-selector { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 14px; scrollbar-width: none; }
  .kpi-selector::-webkit-scrollbar { display: none; }
  .kpi-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all .2s; }
  .kpi-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chart-wrap { position: relative; height: 220px; margin-bottom: 16px; }

  /* ── TABELA ── */
  .ev-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ev-table th { background: var(--surface2); color: var(--text-muted); font-weight: 600; text-align: right; padding: 8px 6px; }
  .ev-table th:first-child { text-align: left; }
  .ev-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); text-align: right; }
  .ev-table td:first-child { text-align: left; font-weight: 600; }
  .ev-table .up   { color: var(--up); }
  .ev-table .down { color: var(--down); }

  /* ── TIMELINE ── */
  .filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 5px 10px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; cursor: pointer; }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, transparent); }

  .timeline-track { position: relative; padding-left: 28px; }
  .timeline-track::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .tl-item { position: relative; margin-bottom: 16px; }
  .tl-dot { position: absolute; left: -22px; top: 6px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg); }
  .tl-dot.alto   { background: var(--accent); }
  .tl-dot.médio  { background: var(--surface2); border-color: var(--accent-bradesco); }
  .tl-dot.baixo  { background: var(--surface2); border-color: var(--border); }
  .tl-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .tl-date-chip { flex-shrink: 0; font-size: 10px; font-weight: 700; background: var(--surface2); border-radius: 4px; padding: 2px 6px; color: var(--text-muted); }
  .tl-cat-badge { flex-shrink: 0; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
  .tl-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
  .tl-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; display: none; }
  .tl-desc.open { display: block; }
  .tl-toggle { font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 4px; }
  .impacto-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; }
  .impacto-badge.alto   { background: rgba(204,0,0,.15); color: var(--accent-bradesco); }
  .impacto-badge.médio  { background: rgba(136,145,168,.15); color: var(--text-muted); }
  .impacto-badge.baixo  { background: rgba(136,145,168,.08); color: var(--border); }

  /* categoria colors */
  .cat-liderança    { background: rgba(168,85,247,.15);  color: #c084fc; }
  .cat-produto      { background: rgba(59,130,246,.15);  color: #60a5fa; }
  .cat-atendimento  { background: rgba(20,184,166,.15);  color: #2dd4bf; }
  .cat-segmentação  { background: rgba(234,179,8,.15);   color: #facc15; }
  .cat-tecnologia   { background: rgba(249,115,22,.15);  color: #fb923c; }
  .cat-parceria     { background: rgba(34,197,94,.15);   color: #4ade80; }
  .cat-precificação { background: rgba(244,63,94,.15);   color: #fb7185; }
  .cat-cross_sell   { background: rgba(99,102,241,.15);  color: #818cf8; }
  .cat-regulatório  { background: rgba(107,114,128,.15); color: #9ca3af; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; color: var(--text-muted); padding: 40px 20px; font-size: 13px; }
</style>
</head>
<body>

<div class="top-nav">
  <div class="bank-chips" id="bankChips"></div>
  <div class="tab-bar">
    <div class="tab active" data-tab="trimestre">Trimestre</div>
    <div class="tab" data-tab="evolucao">Evolução</div>
    <div class="tab" data-tab="estrategia">Estratégia PME</div>
  </div>
</div>

<!-- ABA 1: TRIMESTRE -->
<div class="tab-content visible" id="tab-trimestre">
  <div id="trimestre-content"></div>
</div>

<!-- ABA 2: EVOLUÇÃO -->
<div class="tab-content" id="tab-evolucao">
  <div class="kpi-selector" id="kpiSelector"></div>
  <div class="card">
    <div class="chart-wrap"><canvas id="evolChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">Histórico trimestral</div>
    <div id="evolTable"></div>
  </div>
</div>

<!-- ABA 3: ESTRATÉGIA -->
<div class="tab-content" id="tab-estrategia">
  <div class="filters" id="catFilters"></div>
  <div class="timeline-track" id="timelineTrack"></div>
</div>

<script>
// ── CONFIG POR BANCO ──────────────────────────────────────
const BANK_CONFIG = {
  bradesco: {
    label: "Bradesco",
    tipo: "incumbente",
    cor: "var(--accent-bradesco)",
    hex: "#cc0000",
    priorityKpis: ["lucro_bi","roae_pct","carteira_mpme_bi","npl_mpme_90_pct","npl_mpme_15_pct","eficiencia_pct"],
    kpis: [
      { key: "lucro_bi",          label: "Lucro",           fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "roae_pct",          label: "ROAE",            fmt: v => `${v}%`,                  lowerBetter: false },
      { key: "receitas_bi",       label: "Receitas",        fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "carteira_mpme_bi",  label: "Carteira MPME",   fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "npl_mpme_90_pct",   label: "NPL MPME 90",     fmt: v => `${v}%`,                  lowerBetter: true  },
      { key: "npl_mpme_15_pct",   label: "NPL MPME 15",     fmt: v => `${v}%`,                  lowerBetter: true  },
      { key: "eficiencia_pct",    label: "Eficiência",      fmt: v => `${v}%`,                  lowerBetter: true  },
      { key: "depositos_bi",      label: "Depósitos",       fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "clientes_total_mm", label: "Clientes Total",  fmt: v => `${v}MM`,                 lowerBetter: false },
      { key: "clientes_pme_mil",  label: "Clientes PME",    fmt: v => `${v}k`,                  lowerBetter: false },
    ]
  },
  pagbank: {
    label: "PagBank",
    tipo: "fintech",
    cor: "var(--accent-pagbank)",
    hex: "#f7931a",
    priorityKpis: ["lucro_bi","roe_pct","receitas_bi","tpv_bi","carteira_bi","npl_90_pct"],
    kpis: [
      { key: "lucro_bi",        label: "Lucro",           fmt: v => `R$${(+v).toFixed(2)}bi`, lowerBetter: false },
      { key: "roe_pct",         label: "ROAE",            fmt: v => `${v}%`,                  lowerBetter: false },
      { key: "receitas_bi",     label: "Receitas",        fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "tpv_bi",          label: "TPV",             fmt: v => `R$${(+v).toFixed(0)}bi`, lowerBetter: false },
      { key: "tpv_msmb_bi",     label: "TPV MSMB",        fmt: v => `R$${(+v).toFixed(0)}bi`, lowerBetter: false },
      { key: "carteira_bi",     label: "Carteira Crédito",fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "npl_90_pct",      label: "NPL 90",          fmt: v => `${v}%`,                  lowerBetter: true  },
      { key: "merchants_mm",    label: "Lojistas Ativos", fmt: v => `${v}MM`,                 lowerBetter: false },
      { key: "contas_mm",       label: "Contas Ativas",   fmt: v => `${v}MM`,                 lowerBetter: false },
      { key: "take_rate_pct",   label: "Take Rate",       fmt: v => `${v}%`,                  lowerBetter: false },
    ]
  },
  sicredi: {
    label: "Sicredi",
    tipo: "cooperativa",
    cor: "var(--accent-sicredi)",
    hex: "#007b3e",
    priorityKpis: ["sobras_bi","roe_pct","carteira_bi","carteira_pj_bi","npl_total_pct","npl_pj_pct"],
    kpis: [
      { key: "sobras_bi",      label: "Sobras",          fmt: v => `R$${(+v).toFixed(2)}bi`, lowerBetter: false },
      { key: "roe_pct",        label: "ROAE",            fmt: v => `${v}%`,                  lowerBetter: false },
      { key: "carteira_bi",    label: "Carteira Total",  fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "carteira_pj_bi", label: "Carteira PJ",     fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "carteira_agro_bi",label:"Carteira Agro",   fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "npl_total_pct",  label: "NPL Total 90",    fmt: v => `${v}%`,                  lowerBetter: true  },
      { key: "npl_pj_pct",     label: "NPL PJ 90",       fmt: v => `${v}%`,                  lowerBetter: true  },
      { key: "depositos_bi",   label: "Depósitos",       fmt: v => `R$${(+v).toFixed(1)}bi`, lowerBetter: false },
      { key: "cooperados_mm",  label: "Cooperados",      fmt: v => `${v}MM`,                 lowerBetter: false },
    ]
  }
};

// ── STATE ──────────────────────────────────────────────────
let currentBank = "bradesco";
let currentKpi  = "lucro_bi";
let catFilter   = "todos";
let impFilter   = "todos";
let evolChart   = null;

// ── HELPERS ──────────────────────────────────────────────
function getBankData(bank) {
  const all = [...(window.QUARTERS_DATA||[]), ...(window.QUARTERS_DATA_SICREDI||[]), ...(window.QUARTERS_DATA_PAGBANK||[])];
  return all.filter(q => q.banco_id === bank)
    .sort((a,b) => a.ano*10+a.tri - (b.ano*10+b.tri));
}
function getTimelineData(bank) {
  const all = [...(window.TIMELINE_DATA||[]), ...(window.TIMELINE_DATA_SICREDI||[]), ...(window.TIMELINE_DATA_PAGBANK||[])];
  return all.filter(t => t.banco_id === bank)
    .sort((a,b) => a.data.localeCompare(b.data));
}
function fmt(bank, key, val) {
  if (val == null) return "—";
  const cfg = BANK_CONFIG[bank];
  const kDef = cfg?.kpis.find(k => k.key === key);
  return kDef ? kDef.fmt(val) : val;
}
function deltaClass(val, key) {
  if (val == null) return "neutral";
  const kDef = BANK_CONFIG[currentBank]?.kpis.find(k => k.key === key);
  const lb = kDef ? kDef.lowerBetter : ["npl_mpme_90_pct","npl_mpme_15_pct","eficiencia_pct"].includes(key);
  const better = lb ? val < 0 : val > 0;
  return better ? "up" : val === 0 ? "neutral" : "down";
}
function pctDelta(curr, prev, decimals=1) {
  if (curr == null || prev == null || prev === 0) return null;
  return +((curr/prev - 1)*100).toFixed(decimals);
}
function sign(v) { return v > 0 ? "+" : ""; }

// ── INIT ──────────────────────────────────────────────────
function init() {
  setAccent(currentBank);
  renderBankChips();
  renderTrimestre();
  renderEvolucao();
  renderEstrategia();

  document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(x => x.classList.remove("visible"));
    t.classList.add("active");
    document.getElementById("tab-" + t.dataset.tab).classList.add("visible");
    if (t.dataset.tab === "evolucao") renderEvolucao();
  }));
}

// ── BANK CHIPS ────────────────────────────────────────────
function setAccent(bank) {
  const hex = BANK_CONFIG[bank]?.hex || "#888";
  document.documentElement.style.setProperty("--accent", hex);
}

function renderBankChips() {
  const el = document.getElementById("bankChips");
  el.innerHTML = "";
  const allData = [...(window.QUARTERS_DATA||[]), ...(window.QUARTERS_DATA_SICREDI||[]), ...(window.QUARTERS_DATA_PAGBANK||[])];
  const banks = [...new Set(allData.map(q => q.banco_id))];
  banks.forEach(b => {
    const c = document.createElement("div");
    c.className = "chip-bank" + (b === currentBank ? ` active-${b}` : "");
    c.textContent = BANK_CONFIG[b]?.label || b;
    c.onclick = () => { currentBank = b; setAccent(b); renderBankChips(); renderTrimestre(); renderEvolucao(); renderEstrategia(); };
    el.appendChild(c);
  });
}

// ── ABA TRIMESTRE ─────────────────────────────────────────
function renderTrimestre() {
  const rows = getBankData(currentBank);
  const cur = rows[rows.length - 1];
  const prev = rows[rows.length - 2];
  const yoy  = rows.find(r => r.ano === cur.ano - 1 && r.tri === cur.tri);
  const cfg  = BANK_CONFIG[currentBank];
  const color = cfg?.hex || "#888";

  if (!cur) { document.getElementById("trimestre-content").innerHTML = '<div class="empty-state">Sem dados disponíveis.</div>'; return; }

  // KPIs prioritários sempre visíveis no topo (se tiverem valor)
  const PRIORITY_KEYS = cfg.priorityKpis || ["lucro_bi","roae_pct","carteira_mpme_bi","npl_mpme_90_pct","npl_mpme_15_pct","eficiencia_pct"];
  const kpisToShow = cfg.kpis.filter(k => PRIORITY_KEYS.includes(k.key) && cur.kpis[k.key] != null);
  const kpiCardsHTML = kpisToShow.map(k => {
    const val  = cur.kpis[k.key];
    const pval = prev?.kpis[k.key];
    const yval = yoy?.kpis[k.key];
    const qoq  = pval != null ? +(val - pval).toFixed(2) : null;
    const qoqPct = pval != null ? pct(val, pval) : null;
    const yoyDiff = yval != null ? +(val - yval).toFixed(2) : null;

    const qoqLabel = qoq != null ? `${sign(qoqPct)}${qoqPct}% t/t` : null;
    const yoyLabel = yoyDiff != null ? `${sign(yoyDiff > 0 ? 1 : -1)}${Math.abs(yoyDiff)} a/a` : null;

    return `<div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.fmt(val)}</div>
      <div class="kpi-deltas">
        ${qoqLabel ? `<span class="delta ${deltaClass(qoq, k.key)}">${qoqLabel}</span>` : ''}
        ${yoyLabel ? `<span class="delta ${deltaClass(yoyDiff, k.key)}">${yoyLabel}</span>` : ''}
      </div>
    </div>`;
  }).join("");

  function pct(a,b){ return b===0 ? 0 : +((a/b-1)*100).toFixed(1); }

  // guidance pills
  const guidancePills = cur.guidance
    ? cur.guidance.split(";").map(g => `<span class="guidance-pill">${g.trim()}</span>`).join("")
    : "<span style='color:var(--text-muted)'>Não divulgado</span>";

  document.getElementById("trimestre-content").innerHTML = `
    <div class="period-badge">${cur.periodo} · ${cfg?.label || currentBank} · ${cfg?.tipo || ""}</div>

    <div class="kpi-grid">${kpiCardsHTML}</div>

    <div class="card">
      <div class="card-title">Highlights do trimestre</div>
      <ul class="highlight-list">
        ${cur.highlights.map(h => `<li>${h}</li>`).join("")}
      </ul>
    </div>

    <div class="card">
      <div class="card-title">Percepção do mercado</div>
      <p class="text-block">${cur.percepcao_mercado}</p>
    </div>

    <div class="card">
      <div class="card-title">Mudanças de atendimento</div>
      <p class="text-block">${cur.mudancas_atendimento}</p>
    </div>

    ${cur.guidance ? `<div class="card">
      <div class="card-title">Guidance 2026</div>
      <div>${guidancePills}</div>
    </div>` : ""}
  `;
}

// ── ABA EVOLUÇÃO ──────────────────────────────────────────
function renderEvolucao() {
  const rows = getBankData(currentBank);
  const cfg  = BANK_CONFIG[currentBank];
  if (!rows.length) return;

  // KPI selector
  const sel = document.getElementById("kpiSelector");
  const available = cfg.kpis.filter(k => rows.some(r => r.kpis[k.key] != null));
  if (!available.find(k => k.key === currentKpi)) currentKpi = available[0]?.key;

  sel.innerHTML = available.map(k =>
    `<div class="kpi-chip ${k.key === currentKpi ? 'active' : ''}" data-kpi="${k.key}">${k.label}</div>`
  ).join("");
  sel.querySelectorAll(".kpi-chip").forEach(c => c.addEventListener("click", () => {
    currentKpi = c.dataset.kpi;
    renderEvolucao();
  }));

  // Chart
  const labels = rows.map(r => r.periodo);
  const data   = rows.map(r => r.kpis[currentKpi] ?? null);
  const kDef   = cfg.kpis.find(k => k.key === currentKpi);

  if (evolChart) { evolChart.destroy(); evolChart = null; }
  const ctx = document.getElementById("evolChart").getContext("2d");
  evolChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: kDef?.label || currentKpi,
        data,
        borderColor: cfg?.hex || "#888",
        backgroundColor: (cfg?.hex || "#888") + "22",
        borderWidth: 2.5,
        pointRadius: 5,
        pointBackgroundColor: cfg?.hex || "#888",
        tension: 0.3,
        fill: true,
        spanGaps: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => kDef ? kDef.fmt(ctx.parsed.y) : ctx.parsed.y
          }
        }
      },
      scales: {
        x: { ticks: { color: "#8891a8", font: { size: 11 } }, grid: { color: "#2e3148" } },
        y: { ticks: { color: "#8891a8", font: { size: 11 },
                      callback: v => kDef ? kDef.fmt(v) : v },
             grid: { color: "#2e3148" } }
      }
    }
  });

  // Table
  const tableRows = rows.map((r, i) => {
    const val  = r.kpis[currentKpi];
    const prev = i > 0 ? rows[i-1].kpis[currentKpi] : null;
    const yoy  = rows.find(x => x.ano === r.ano-1 && x.tri === r.tri)?.kpis[currentKpi] ?? null;
    const qoq  = val != null && prev != null ? +((val/prev-1)*100).toFixed(1) : null;
    const yoyP = val != null && yoy  != null ? +((val/yoy -1)*100).toFixed(1) : null;
    const cls  = (v, k) => v==null ? "" : deltaClass(v,k)==="up" ? "up" : deltaClass(v,k)==="down" ? "down" : "";
    return `<tr>
      <td>${r.periodo}</td>
      <td>${val != null ? kDef?.fmt(val) || val : "—"}</td>
      <td class="${cls(qoq, currentKpi)}">${qoq != null ? (qoq>0?"+":"")+qoq+"%" : "—"}</td>
      <td class="${cls(yoyP, currentKpi)}">${yoyP != null ? (yoyP>0?"+":"")+yoyP+"%" : "—"}</td>
    </tr>`;
  }).reverse().join("");

  document.getElementById("evolTable").innerHTML = `
    <table class="ev-table">
      <thead><tr><th>Período</th><th>Valor</th><th>QoQ</th><th>YoY</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;
}

// ── ABA ESTRATÉGIA ────────────────────────────────────────
const CAT_LABELS = {
  todos: "Todos", liderança: "Liderança", produto: "Produto",
  atendimento: "Atendimento", tecnologia: "Tecnologia", parceria: "Parceria",
  precificação: "Preço", cross_sell: "Cross-sell", regulatório: "Regulatório"
};

function renderEstrategia() {
  const all = getTimelineData(currentBank);
  const cats = ["todos", ...new Set(all.map(t => t.categoria))];

  // filters
  const filtersEl = document.getElementById("catFilters");
  filtersEl.innerHTML = cats.map(c =>
    `<div class="filter-chip ${c === catFilter ? 'active' : ''}" data-cat="${c}">${CAT_LABELS[c] || c}</div>`
  ).join("");
  filtersEl.querySelectorAll(".filter-chip").forEach(c => c.addEventListener("click", () => {
    catFilter = c.dataset.cat;
    renderEstrategia();
  }));

  // timeline items
  const filtered = catFilter === "todos" ? all : all.filter(t => t.categoria === catFilter);
  const track = document.getElementById("timelineTrack");
  if (!filtered.length) { track.innerHTML = '<div class="empty-state">Nenhum evento encontrado.</div>'; return; }

  track.innerHTML = filtered.map((t, idx) => {
    const catClass = "cat-" + t.categoria.replace("_","-");
    const hasDesc  = t.descricao && t.descricao.trim();
    return `<div class="tl-item">
      <div class="tl-dot ${t.impacto_pme}"></div>
      <div class="tl-header">
        <span class="tl-date-chip">${t.data}</span>
        <span class="tl-cat-badge ${catClass}">${t.categoria}</span>
      </div>
      <div class="tl-title">${t.titulo}</div>
      ${hasDesc ? `
        <div class="tl-desc" id="desc-${idx}">${t.descricao}</div>
        <div class="tl-toggle" onclick="toggleDesc(${idx})">▾ ver mais</div>
      ` : ""}
      <span class="impacto-badge ${t.impacto_pme}">PME: ${t.impacto_pme}</span>
    </div>`;
  }).join("");
}

function toggleDesc(idx) {
  const el = document.getElementById("desc-"+idx);
  const toggle = el.nextElementSibling;
  el.classList.toggle("open");
  toggle.textContent = el.classList.contains("open") ? "▴ fechar" : "▾ ver mais";
}

// ── RUN ───────────────────────────────────────────────────
init();
</script>
